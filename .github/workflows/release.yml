name: Release hewd binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.goos }} / ${{ matrix.goarch }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]

    env:
      CGO_ENABLED: 0

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Extract version from tag
        id: version
        run: |
          echo "GITHUB_REF=$GITHUB_REF"
          VERSION="${GITHUB_REF#refs/tags/}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build binary
        run: |
          mkdir -p dist

          OUTPUT="hewd"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            OUTPUT="hewd.exe"
          fi

          echo "Building ${OUTPUT} for ${{ matrix.goos }} / ${{ matrix.goarch }}"

          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
          go build \
            -trimpath \
            -ldflags="-s -w -X github.com/jbakchr/hewd/internal/version.Version=${VERSION}" \
            -o dist/${OUTPUT} \
            ./cmd/hewd

      - name: Package archive
        run: |
          cd dist
          NAME="hewd_${VERSION}_${{ matrix.goos }}_${{ matrix.goarch }}"

          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip ${NAME}.zip hewd.exe
          else
            tar -czf ${NAME}.tar.gz hewd
          fi

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > CHECKSUMS_${{ matrix.goos }}_${{ matrix.goarch }}

      - name: Upload artifacts for final job
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  release:
    name: Upload Release Assets
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: collected

      - name: Merge checksum files
        run: |
          cd collected
          cat */CHECKSUMS_* > SHA256SUMS

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: collected/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
