name: Release hewd binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

jobs:
  build:
    name: Build for ${{ matrix.goos }} / ${{ matrix.goarch }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Extract version from tag
        id: vars
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Build binary
        run: |
          mkdir -p dist
          OUTPUT="hewd"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            OUTPUT="hewd.exe"
          fi

          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
          go build \
            -ldflags="-X github.com/jbakchr/hewd/internal/version.Version=${VERSION}" \
            -o dist/${OUTPUT} \
            ./cmd/hewd

      - name: Package archive
        run: |
          cd dist
          NAME="hewd_${VERSION}_${{ matrix.goos }}_${{ matrix.goarch }}"

          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip ${NAME}.zip hewd.exe
          else
            tar -czf ${NAME}.tar.gz hewd
          fi

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
