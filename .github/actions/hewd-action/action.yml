name: "hewd Project Health Checker"
description: "Run hewd doctor with scoring, categories, and Markdown output—or run hewd diff for PR comparisons"
author: "jbakchr"

inputs:
  fail-on:
    description: "Fail on this severity or higher (info|warn|error)"
    required: false
    default: "error"

  only:
    description: "Comma-separated list of categories to include"
    required: false
    default: ""

  except:
    description: "Comma-separated list of categories to exclude"
    required: false
    default: ""

  md-report:
    description: "Output Markdown doctor report"
    required: false
    default: "true"

  github-token:
    description: "GitHub token for posting PR comments"
    required: false
    default: "${{ github.token }}"

  pr-comment:
    description: "Post Markdown doctor report as a PR comment"
    required: false
    default: "true"

  diff:
    description: "Run hewd diff instead of hewd doctor"
    required: false
    default: "false"

  diff-old:
    description: "Path to old hewd JSON report"
    required: false
    default: ""

  diff-new:
    description: "Path to new hewd JSON report"
    required: false
    default: ""

  diff-md-report:
    description: "Post Markdown diff output"
    required: false
    default: "true"

  diff-pr-comment:
    description: "Post diff as a PR comment"
    required: false
    default: "true"

runs:
  using: "composite"
  steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Build hewd CLI
      shell: bash
      run: |
        cd ${{ github.workspace }}
        go build -o hewd ./cmd/hewd
        chmod +x hewd
        echo "${{ github.workspace }}" >> $GITHUB_PATH

    - name: Move hewd to PATH
      shell: bash
      run: |
        mv "${{ github.workspace }}/hewd" /usr/local/bin/hewd
        chmod +x /usr/local/bin/hewd

    - name: Run Hewd Action
      shell: bash
      run: $GITHUB_ACTION_PATH/entrypoint.sh

branding:
  icon: "check-circle"
  color: "blue"
